name: GitHub Bot

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  ai_bot:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: AI-style response
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim();

            // Simple "AI-like" behaviour
            function generateResponse(input) {
              if (input.length < 3) {
                return "I saw your message, but it looks a bit short. Want to tell me more?";
              }

              if (input.toLowerCase().includes("help")) {
                return "I'm here to help. Tell me what you're trying to understand or fix in this PR.";
              }

              if (input.toLowerCase().includes("explain")) {
                return "Sure — this PR changes some code. If you want a deeper explanation, just say what part you're curious about.";
              }

              // Default AI-style reply
              return `I read your message: "${input}". What would you like me to do with it?`;
            }

            const reply = generateResponse(comment);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reply
            });
